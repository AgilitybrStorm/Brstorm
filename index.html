<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<meta name="theme-color" content="#7C3AED">
<title>BrStorm — Controle de Incubação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Supabase SDK via CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ============ VARIÁVEIS GLOBAIS ============ */
  :root {
    color-scheme: light;
    --lilas-claro: #F5F3FF;
    --lilas-medio: #DDD6FE;
    --lilas: #7C3AED;
    --lilas-escuro: #5B21B6;
    --amarelo-claro: #FEF3C7;
    --amarelo-medio: #FDE68A;
    --amarelo: #FCD34D;
    --amarelo-escuro: #B45309;
    --preto: #1F1B2E;
    --branco: #FFFFFF;
    --cinza: #E5E7EB;
    --verde-oliva: #4B5320;
  }

  /* ============ RESET E BASE ============ */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--branco) !important;
    color: var(--preto);
    font-family: 'DM Sans', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body {
    background: radial-gradient(ellipse at top, var(--lilas-claro) 0%, var(--branco) 60%) !important;
  }

  /* ============ TELA DE LOGIN ============ */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-box {
    background: var(--branco);
    border: 1.5px solid var(--lilas-medio);
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 10px 40px -10px rgba(124, 58, 237, 0.2);
  }
  .login-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .login-logo-icon {
    width: 48px; height: 48px;
    background: var(--lilas);
    border-radius: 12px;
    display: grid; place-items: center;
    box-shadow: 0 4px 12px -2px rgba(124, 58, 237, 0.4);
    flex-shrink: 0;
  }
  .login-logo h1 {
    font-family: 'Fraunces', serif;
    font-size: 26px; font-weight: 600;
    color: var(--lilas-escuro);
    line-height: 1;
  }
  .login-logo p {
    font-size: 10px; color: var(--lilas);
    font-style: italic; opacity: 0.75;
    margin-top: 3px;
  }
  .login-title {
    font-family: 'Fraunces', serif;
    font-size: 18px; font-weight: 600;
    color: var(--preto);
    margin-bottom: 20px;
  }
  .login-field { margin-bottom: 14px; }
  .login-field label {
    display: block;
    font-size: 10px; font-weight: 700;
    color: var(--lilas); text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 6px;
  }
  .login-field input {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--lilas-medio);
    border-radius: 12px;
    font-family: inherit; font-size: 16px;
    background: var(--lilas-claro);
    color: var(--preto);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .login-field input:focus {
    border-color: var(--lilas);
    background: var(--branco);
  }
  .login-btn {
    width: 100%;
    padding: 14px;
    background: var(--lilas);
    color: var(--branco);
    border: none; border-radius: 12px;
    font-family: inherit; font-size: 15px; font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
    transition: opacity 0.2s;
  }
  .login-btn:active { opacity: 0.85; }
  .login-error {
    color: #DC2626;
    font-size: 12px;
    margin-top: 10px;
    text-align: center;
    display: none;
  }

  /* ============ APP PRINCIPAL ============ */
  #app-screen { display: none; }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 16px 12px 80px;
    position: relative;
  }

  /* ============ HEADER ============ */
  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 4px 0 16px;
    border-bottom: 1px solid var(--lilas-medio);
    margin-bottom: 16px;
  }
  .brand { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
  .logo {
    width: 40px; height: 40px; flex-shrink: 0;
    background: var(--lilas); border-radius: 10px;
    display: grid; place-items: center;
    box-shadow: 0 4px 12px -2px rgba(124, 58, 237, 0.4);
  }
  .brand-text { min-width: 0; }
  .brand-text h1 {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 600;
    color: var(--lilas-escuro);
    line-height: 1; letter-spacing: -0.02em;
  }
  .brand-text .slogan {
    font-size: 9px; color: var(--lilas);
    margin-top: 3px; font-style: italic;
    line-height: 1.2; opacity: 0.75;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Relógio + botão de logout */
  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .clock {
    text-align: right;
    background: var(--amarelo);
    padding: 8px 12px; border-radius: 10px;
    box-shadow: 0 2px 8px -2px rgba(252, 211, 77, 0.6);
    border: 1px solid var(--amarelo-medio);
  }
  .clock-time {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 600;
    color: var(--preto); line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .clock-date {
    font-size: 9px; color: var(--preto);
    margin-top: 3px; font-weight: 500;
    text-transform: lowercase;
    letter-spacing: 0.02em;
  }

  /* Badge de papel do usuário + logout */
  .user-badge {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .role-badge {
    font-size: 8px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 3px 8px; border-radius: 20px;
  }
  .role-admin { background: var(--lilas); color: var(--branco); }
  .role-visualizador { background: var(--cinza); color: var(--preto); }
  .logout-btn {
    background: none; border: 1px solid var(--lilas-medio);
    border-radius: 6px; padding: 3px 8px;
    font-family: inherit; font-size: 9px;
    color: var(--lilas); cursor: pointer;
  }

  /* ============ STATS ============ */
  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 6px; margin-bottom: 20px;
  }
  .stat {
    background: var(--branco);
    border-radius: 10px; padding: 8px 10px;
    border: 1px solid var(--lilas-medio);
  }
  .stat-label {
    font-size: 8px; color: var(--lilas);
    text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 700; margin-bottom: 2px;
  }
  .stat-value {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 600;
    color: var(--preto); line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .stat:nth-child(2) { background: var(--amarelo); border-color: var(--amarelo-medio); }
  .stat:nth-child(2) .stat-label { color: var(--amarelo-escuro); }

  /* ============ MOTOR DE VIRAGEM ============ */
  .tray-wrapper { position: relative; margin-bottom: 20px; }
  .motor {
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto -2px; position: relative; z-index: 3; width: fit-content;
  }
  .motor-box {
    background: linear-gradient(180deg, var(--lilas-escuro) 0%, var(--lilas) 100%);
    color: var(--branco); padding: 10px 28px 12px;
    border-radius: 14px 14px 4px 4px;
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    box-shadow: 0 6px 16px -4px rgba(124, 58, 237, 0.5), 0 1px 0 rgba(255,255,255,0.2) inset;
    border: 1px solid var(--lilas-escuro);
  }
  .motor-icon {
    width: 18px; height: 18px; display: grid; place-items: center;
    background: rgba(255,255,255,0.15); border-radius: 50%;
  }
  .motor-spin { animation: spin 4s linear infinite; transform-origin: center; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .eixo {
    height: 8px;
    background: linear-gradient(180deg, var(--lilas) 0%, var(--lilas-escuro) 100%);
    border-radius: 4px 4px 0 0; margin: 0 4px;
    position: relative; z-index: 2;
    box-shadow: 0 2px 6px -2px rgba(124, 58, 237, 0.4);
  }

  /* ============ BANDEJA — fundo verde oliva ============ */
  .tray {
    background: var(--verde-oliva);
    border: 1.5px solid var(--lilas-medio);
    border-top: none; border-radius: 0 0 16px 16px;
    padding: 12px 6px 12px;
    box-shadow: 0 10px 30px -10px rgba(91, 33, 182, 0.2);
  }

  /* ============ GRID FIXO DE 7 COLUNAS ============ */
  .grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 5px; width: 100%; overflow: hidden;
  }

  .col {
    display: flex; flex-direction: column; gap: 3px;
    padding: 6px 3px 8px; border-radius: 8px;
    position: relative; min-width: 0; overflow: hidden;
  }
  .col-lilas { background: var(--lilas-claro); border: 1px solid var(--lilas-medio); }
  .col-amarelo { background: var(--amarelo-claro); border: 1px solid var(--amarelo-medio); }

  .col-label {
    font-family: 'Fraunces', serif; font-size: 15px; font-weight: 700;
    text-align: center; line-height: 1;
    padding: 2px 0 6px; margin-bottom: 2px; border-bottom: 1px dashed;
  }
  .col-lilas .col-label { color: var(--lilas-escuro); border-color: var(--lilas-medio); }
  .col-amarelo .col-label { color: var(--amarelo-escuro); border-color: var(--amarelo-medio); }

  /* ============ OVO ============ */
  .egg {
    aspect-ratio: 1; background: var(--branco); border: 1.5px solid;
    border-radius: 50%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; padding: 2px; font-family: inherit;
    transition: transform 0.12s ease, background 0.2s;
    position: relative; overflow: hidden; width: 100%; min-width: 0;
  }
  .col-lilas .egg { border-color: var(--lilas-medio); }
  .col-amarelo .egg { border-color: var(--amarelo-medio); }
  .egg:active { transform: scale(0.88); }

  /* Visualizador não pode clicar para editar */
  .role-view .egg { cursor: default; }

  .egg-pos { font-size: 8px; font-weight: 600; line-height: 1; opacity: 0.55; }
  .col-lilas .egg-pos { color: var(--lilas); }
  .col-amarelo .egg-pos { color: var(--amarelo-escuro); }

  /* ============ OVO CHOCANDO ============ */
  .col-lilas .egg.chocando {
    background: var(--lilas); border-color: var(--lilas-escuro);
    box-shadow: 0 2px 6px -1px rgba(124, 58, 237, 0.5);
  }
  .col-amarelo .egg.chocando {
    background: var(--amarelo); border-color: var(--amarelo-escuro);
    box-shadow: 0 2px 6px -1px rgba(252, 211, 77, 0.6);
  }
  .egg.chocando .egg-pos { display: none; }

  /* 4 linhas de informação no ovo chocando */
  .egg-info {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1px; width: 100%; padding: 0 2px;
  }
  .egg-info-pos {
    font-size: 7px; font-weight: 800; line-height: 1;
    text-align: center; width: 100%;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .egg-info-name {
    font-size: 6px; font-weight: 700; line-height: 1.1;
    text-align: center; width: 100%;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }
  .egg-info-date {
    font-size: 6px; font-weight: 500; line-height: 1.1;
    text-align: center; width: 100%;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis; opacity: 0.85;
  }
  .egg-info-time {
    font-family: 'Fraunces', serif; font-size: 7px; font-weight: 700;
    line-height: 1; text-align: center; width: 100%;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    font-variant-numeric: tabular-nums; margin-top: 1px;
  }

  /* Cores no ovo lilás chocando */
  .col-lilas .egg.chocando .egg-info-pos  { color: var(--amarelo); }
  .col-lilas .egg.chocando .egg-info-name { color: var(--branco); }
  .col-lilas .egg.chocando .egg-info-date { color: var(--lilas-medio); }
  .col-lilas .egg.chocando .egg-info-time { color: var(--amarelo-medio); }

  /* Cores no ovo amarelo chocando */
  .col-amarelo .egg.chocando .egg-info-pos  { color: var(--lilas-escuro); }
  .col-amarelo .egg.chocando .egg-info-name { color: var(--preto); }
  .col-amarelo .egg.chocando .egg-info-date { color: var(--amarelo-escuro); }
  .col-amarelo .egg.chocando .egg-info-time { color: var(--lilas-escuro); }

  /* Indicador pulsante */
  .egg.chocando::after {
    content: ''; position: absolute; top: 2px; right: 2px;
    width: 4px; height: 4px; background: var(--branco);
    border-radius: 50%; animation: pulse 2s infinite;
  }
  .col-amarelo .egg.chocando::after { background: var(--preto); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ============ MODAL ============ */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(31, 27, 46, 0.55);
    backdrop-filter: blur(4px);
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: auto; }

  .modal {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--branco); border-radius: 24px 24px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    z-index: 101; transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    max-width: 480px; margin: 0 auto;
  }
  .modal.open { transform: translateY(0); }

  .modal-handle {
    width: 40px; height: 4px; background: var(--cinza);
    border-radius: 2px; margin: 0 auto 16px;
  }
  .modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .modal-pos {
    width: 52px; height: 52px; background: var(--lilas); color: var(--branco);
    border-radius: 50%; display: grid; place-items: center;
    font-family: 'Fraunces', serif; font-size: 18px; font-weight: 700; flex-shrink: 0;
  }
  .modal-pos.amarelo { background: var(--amarelo); color: var(--preto); }
  .modal-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; color: var(--preto); line-height: 1.1; }
  .modal-subtitle { font-size: 12px; color: var(--lilas); margin-top: 2px; }

  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 10px; font-weight: 700;
    color: var(--lilas); text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 6px;
  }
  .field input {
    width: 100%; padding: 14px 16px;
    border: 1.5px solid var(--lilas-medio); border-radius: 12px;
    font-family: inherit; font-size: 16px;
    background: var(--lilas-claro); color: var(--preto);
    outline: none; transition: border-color 0.2s, background 0.2s;
  }
  .field input:focus { border-color: var(--lilas); background: var(--branco); }
  .field input:disabled { opacity: 0.6; cursor: not-allowed; }

  .info-block {
    background: var(--lilas-claro); border-radius: 12px;
    padding: 10px 14px; margin-bottom: 14px; display: grid; gap: 6px;
  }
  .info-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .info-row span:first-child { color: var(--lilas); font-weight: 500; }
  .info-row span:last-child { color: var(--preto); font-weight: 600; font-variant-numeric: tabular-nums; }
  .info-row .destaque { font-family: 'Fraunces', serif; font-size: 16px; color: var(--lilas-escuro); }

  .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
  .btn {
    flex: 1; padding: 13px 16px; border: none; border-radius: 12px;
    font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
    transition: transform 0.1s, opacity 0.2s; letter-spacing: 0.02em;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--lilas); color: var(--branco); }
  .btn-secondary { background: var(--lilas-claro); color: var(--lilas-escuro); }
  .btn-danger { background: var(--branco); color: var(--lilas-escuro); border: 1.5px solid var(--lilas-medio); }
  .btn-full { width: 100%; margin-top: 8px; }

  /* ============ FOOTER ============ */
  .footer-actions { text-align: center; margin-top: 12px; }
  .reset-btn {
    background: none; border: none; color: var(--lilas); opacity: 0.5;
    font-family: inherit; font-size: 11px; cursor: pointer;
    padding: 8px 16px; text-decoration: underline;
  }
  .reset-btn:active { opacity: 1; }

  /* Loading overlay */
  .loading {
    position: fixed; inset: 0;
    background: rgba(255,255,255,0.8);
    display: grid; place-items: center;
    z-index: 200; font-size: 14px; color: var(--lilas);
    font-weight: 600;
  }
  .loading.hidden { display: none; }

  /* ============ RESPONSIVIDADE ============ */
  @media (max-width: 380px) {
    .app { padding: 12px 8px 80px; }
    .grid { gap: 3px; }
    .col { padding: 4px 2px 6px; gap: 2px; }
    .col-label { font-size: 12px; }
    .egg-pos { font-size: 7px; }
    .egg-info-pos  { font-size: 6px; }
    .egg-info-name { font-size: 5px; }
    .egg-info-date { font-size: 5px; }
    .egg-info-time { font-size: 6px; }
  }
  @media (min-width: 540px) {
    .grid { gap: 8px; }
    .col-label { font-size: 18px; }
    .egg-pos { font-size: 10px; }
    .egg-info-pos  { font-size: 9px; }
    .egg-info-name { font-size: 8px; }
    .egg-info-date { font-size: 8px; }
    .egg-info-time { font-size: 9px; }
  }
</style>
</head>
<body>

<!-- Loading global -->
<div class="loading hidden" id="loading">Carregando...</div>

<!-- ============ TELA DE LOGIN ============ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <ellipse cx="12" cy="13" rx="7" ry="9" fill="#FCD34D"/>
          <path d="M8 11 Q12 7 16 11" stroke="#5B21B6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <h1>BrStorm</h1>
        <p>A viagem — aves ornamentais & poedeiras</p>
      </div>
    </div>
    <div class="login-title">Entrar</div>
    <div class="login-field">
      <label for="login-email">E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label for="login-password">Senha</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="login-btn">Entrar</button>
    <div class="login-error" id="login-error">E-mail ou senha incorretos.</div>
  </div>
</div>

<!-- ============ APP PRINCIPAL ============ -->
<div id="app-screen">
  <div class="app">

    <header>
      <div class="brand">
        <div class="logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <ellipse cx="12" cy="13" rx="7" ry="9" fill="#FCD34D"/>
            <path d="M8 11 Q12 7 16 11" stroke="#5B21B6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>BrStorm</h1>
          <div class="slogan">A viagem — aves ornamentais &amp; poedeiras</div>
        </div>
      </div>
      <div class="header-right">
        <div class="clock">
          <div class="clock-time" id="clock-time">--:--</div>
          <div class="clock-date" id="clock-date">--</div>
        </div>
        <div class="user-badge">
          <span class="role-badge" id="role-badge">--</span>
          <button class="logout-btn" id="logout-btn">Sair</button>
        </div>
      </div>
    </header>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Capacidade</div>
        <div class="stat-value">63</div>
      </div>
      <div class="stat">
        <div class="stat-label">Chocando</div>
        <div class="stat-value" id="stat-chocando">00</div>
      </div>
      <div class="stat">
        <div class="stat-label">Livres</div>
        <div class="stat-value" id="stat-livres">63</div>
      </div>
    </div>

    <div class="tray-wrapper">
      <div class="motor">
        <div class="motor-box">
          <div class="motor-icon">
            <svg class="motor-spin" width="12" height="12" viewBox="0 0 24 24" fill="none">
              <path d="M12 2 L12 6 M12 18 L12 22 M2 12 L6 12 M18 12 L22 12 M4.93 4.93 L7.76 7.76 M16.24 16.24 L19.07 19.07 M4.93 19.07 L7.76 16.24 M16.24 7.76 L19.07 4.93" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <circle cx="12" cy="12" r="3" stroke="white" stroke-width="2" fill="none"/>
            </svg>
          </div>
          <span>Motor de Viragem</span>
        </div>
      </div>
      <div class="eixo"></div>
      <div class="tray">
        <div class="grid" id="grid"></div>
      </div>
    </div>

    <div class="footer-actions">
      <button class="reset-btn" id="reset-btn">Limpar todos os registros</button>
    </div>

  </div>
</div>

<!-- ============ MODAL ============ -->
<div class="modal-backdrop" id="backdrop"></div>
<div class="modal" id="modal">
  <div class="modal-handle"></div>
  <div class="modal-header">
    <div class="modal-pos" id="modal-pos">A1</div>
    <div>
      <div class="modal-title" id="modal-title">Nova incubação</div>
      <div class="modal-subtitle" id="modal-subtitle">Posição livre</div>
    </div>
  </div>
  <div class="field">
    <label for="egg-name-input">Nome (galinha ou casal)</label>
    <input type="text" id="egg-name-input" placeholder="Ex: Aurora, Casal 03..." maxlength="20" autocomplete="off">
  </div>
  <div class="info-block">
    <div class="info-row">
      <span>Início</span>
      <span id="info-inicio">—</span>
    </div>
    <div class="info-row" id="info-tempo-row" style="display:none;">
      <span>Tempo decorrido</span>
      <span class="destaque" id="info-tempo">—</span>
    </div>
  </div>
  <div class="modal-actions">
    <button class="btn btn-secondary" id="btn-cancel">Cancelar</button>
    <button class="btn btn-primary" id="btn-save">Iniciar incubação</button>
  </div>
  <button class="btn btn-danger btn-full" id="btn-remove" style="display:none;">Liberar posição</button>
</div>

<script>
// ============ CONFIGURAÇÃO SUPABASE ============
// URL e chave pública do projeto Granja-BrStorm
const SUPABASE_URL  = 'https://jlyvkhrwmhhtpdchavzn.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpseXZraHJ3bWhodHBkY2hhdnpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4ODM5MjksImV4cCI6MjA5NjQ1OTkyOX0.YopMiNfZAwbCBaK6loz3FvhEr_TllT-Vn_7_A_rUi_w';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ============ ESTADO GLOBAL ============
const COLS = ['A','B','C','D','E','F','G'];
const ROWS = 9;

let eggs       = {};      // mapa posicao -> registro
let currentPos = null;    // posição aberta no modal
let userRole   = null;    // 'admin' ou 'visualizador'
let userId     = null;    // UUID do usuário logado

// ============ UTILITÁRIOS ============

function showLoading(show) {
  document.getElementById('loading').classList.toggle('hidden', !show);
}

// Formata tempo decorrido desde início da incubação
function formatElapsed(startIso) {
  const diff  = Date.now() - new Date(startIso).getTime();
  const days  = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  return `${days}d ${hours}h`;
}

// Formata data/hora completa para o modal
function formatDateTime(isoStr) {
  return new Date(isoStr).toLocaleString('pt-BR', {
    timeZone: 'America/Sao_Paulo',
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

// Formata data curta para o ovo (dd/mm/aa)
function formatDateShort(isoStr) {
  return new Date(isoStr).toLocaleDateString('pt-BR', {
    timeZone: 'America/Sao_Paulo',
    day: '2-digit', month: '2-digit', year: '2-digit'
  });
}

// Tema da coluna: lilás (par) ou amarelo (ímpar)
function colTema(letter) {
  return COLS.indexOf(letter) % 2 === 0 ? 'lilas' : 'amarelo';
}

// ============ AUTENTICAÇÃO ============

// Verifica sessão ativa ao carregar a página
async function checkSession() {
  showLoading(true);
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    await initApp(session.user);
  } else {
    showLoginScreen();
  }
  showLoading(false);
}

// Exibe tela de login
function showLoginScreen() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display   = 'none';
}

// Exibe app principal
function showAppScreen() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display   = 'block';
}

// Inicializa o app após login bem-sucedido
async function initApp(user) {
  userId   = user.id;
  // Papel do usuário fica em app_metadata.role
  userRole = user.app_metadata?.role || 'visualizador';

  // Exibe badge de papel no header
  const badge = document.getElementById('role-badge');
  badge.textContent = userRole === 'admin' ? 'Admin' : 'Visualizador';
  badge.className   = `role-badge role-${userRole}`;

  // Visualizador não pode editar — adiciona classe no grid
  if (userRole !== 'admin') {
    document.getElementById('grid').classList.add('role-view');
    document.getElementById('reset-btn').style.display = 'none';
  }

  showAppScreen();
  await loadEggs();
  updateClock();
}

// Login com e-mail e senha
document.getElementById('login-btn').addEventListener('click', async () => {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorEl  = document.getElementById('login-error');
  errorEl.style.display = 'none';

  if (!email || !password) return;
  showLoading(true);

  const { data, error } = await db.auth.signInWithPassword({ email, password });
  showLoading(false);

  if (error) {
    errorEl.style.display = 'block';
    return;
  }
  await initApp(data.user);
});

// Enter no campo de senha faz login
document.getElementById('login-password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

// Logout
document.getElementById('logout-btn').addEventListener('click', async () => {
  await db.auth.signOut();
  eggs     = {};
  userRole = null;
  userId   = null;
  showLoginScreen();
});

// ============ BANCO DE DADOS ============

// Carrega todos os ovos em incubação do Supabase
async function loadEggs() {
  const { data, error } = await db
    .from('incubacoes')
    .select('*');

  if (error) { console.error('Erro ao carregar:', error); return; }

  // Converte array de registros em mapa posicao -> registro
  eggs = {};
  data.forEach(row => { eggs[row.posicao] = row; });
  renderGrid();
}

// Salva ou atualiza um ovo no Supabase
async function saveEgg(pos, name) {
  if (eggs[pos]) {
    // Atualiza nome
    const { error } = await db
      .from('incubacoes')
      .update({ nome: name })
      .eq('posicao', pos);
    if (error) { console.error('Erro ao atualizar:', error); return; }
    eggs[pos].nome = name;
  } else {
    // Novo registro
    const { data, error } = await db
      .from('incubacoes')
      .insert({ posicao: pos, nome: name, criado_por: userId })
      .select()
      .single();
    if (error) { console.error('Erro ao inserir:', error); return; }
    eggs[pos] = data;
  }
  renderGrid();
}

// Remove um ovo do Supabase
async function deleteEgg(pos) {
  const { error } = await db
    .from('incubacoes')
    .delete()
    .eq('posicao', pos);
  if (error) { console.error('Erro ao deletar:', error); return; }
  delete eggs[pos];
  renderGrid();
}

// Remove todos os ovos (somente admin)
async function deleteAllEggs() {
  const { error } = await db
    .from('incubacoes')
    .delete()
    .neq('id', '00000000-0000-0000-0000-000000000000'); // deleta tudo
  if (error) { console.error('Erro ao limpar:', error); return; }
  eggs = {};
  renderGrid();
}

// ============ RENDERIZAÇÃO ============

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let chocando = 0;

  COLS.forEach(letter => {
    const tema = colTema(letter);
    const col  = document.createElement('div');
    col.className = `col col-${tema}`;
    col.innerHTML = `<div class="col-label">${letter}</div>`;

    for (let n = 1; n <= ROWS; n++) {
      const pos = `${letter}${n}`;
      const egg = eggs[pos];
      const btn = document.createElement('button');
      btn.className  = 'egg' + (egg ? ' chocando' : '');
      btn.dataset.pos = pos;

      if (egg) {
        chocando++;
        // 4 linhas: posição | nome | data início | tempo decorrido
        btn.innerHTML = `
          <div class="egg-info">
            <div class="egg-info-pos">${pos}</div>
            <div class="egg-info-name">${egg.nome}</div>
            <div class="egg-info-date">${formatDateShort(egg.inicio)}</div>
            <div class="egg-info-time" data-start="${egg.inicio}">${formatElapsed(egg.inicio)}</div>
          </div>`;
      } else {
        btn.innerHTML = `<div class="egg-pos">${n}</div>`;
      }

      // Somente admin abre modal ao clicar
      if (userRole === 'admin') {
        btn.addEventListener('click', () => openModal(pos));
      }
      col.appendChild(btn);
    }
    grid.appendChild(col);
  });

  document.getElementById('stat-chocando').textContent = String(chocando).padStart(2,'0');
  document.getElementById('stat-livres').textContent   = String(63 - chocando).padStart(2,'0');
}

// ============ MODAL ============

function openModal(pos) {
  currentPos = pos;
  const letter = pos[0];
  const tema   = colTema(letter);
  const egg    = eggs[pos];

  document.getElementById('modal-pos').textContent = pos;
  document.getElementById('modal-pos').classList.toggle('amarelo', tema === 'amarelo');

  const input = document.getElementById('egg-name-input');

  if (egg) {
    document.getElementById('modal-title').textContent    = 'Em incubação';
    document.getElementById('modal-subtitle').textContent = `Coluna ${letter} · editar ou liberar`;
    input.value = egg.nome;
    input.disabled = false;
    document.getElementById('btn-save').textContent       = 'Salvar alterações';
    document.getElementById('btn-remove').style.display   = 'block';
    document.getElementById('info-inicio').textContent    = formatDateTime(egg.inicio);
    document.getElementById('info-tempo').textContent     = formatElapsed(egg.inicio);
    document.getElementById('info-tempo-row').style.display = 'flex';
  } else {
    document.getElementById('modal-title').textContent    = 'Nova incubação';
    document.getElementById('modal-subtitle').textContent = `Coluna ${letter} · posição livre`;
    input.value = '';
    input.disabled = false;
    document.getElementById('btn-save').textContent       = 'Iniciar incubação';
    document.getElementById('btn-remove').style.display   = 'none';
    document.getElementById('info-inicio').textContent    = formatDateTime(new Date().toISOString()) + ' (agora)';
    document.getElementById('info-tempo-row').style.display = 'none';
  }

  document.getElementById('modal').classList.add('open');
  document.getElementById('backdrop').classList.add('open');
  setTimeout(() => input.focus(), 300);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
  currentPos = null;
}

async function saveCurrentEgg() {
  if (!currentPos) return;
  const name = document.getElementById('egg-name-input').value.trim();
  if (!name) { document.getElementById('egg-name-input').focus(); return; }
  showLoading(true);
  await saveEgg(currentPos, name);
  showLoading(false);
  closeModal();
}

async function removeCurrentEgg() {
  if (!currentPos) return;
  if (!confirm(`Liberar a posição ${currentPos}? O registro será apagado.`)) return;
  showLoading(true);
  await deleteEgg(currentPos);
  showLoading(false);
  closeModal();
}

// ============ EVENTOS ============
document.getElementById('backdrop').addEventListener('click', closeModal);
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('btn-save').addEventListener('click', saveCurrentEgg);
document.getElementById('btn-remove').addEventListener('click', removeCurrentEgg);
document.getElementById('egg-name-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') saveCurrentEgg();
});

document.getElementById('reset-btn').addEventListener('click', async () => {
  if (!confirm('Apagar TODOS os registros? Esta ação não pode ser desfeita.')) return;
  showLoading(true);
  await deleteAllEggs();
  showLoading(false);
});

// ============ RELÓGIO ============
function updateClock() {
  const now  = new Date();
  const opts = { timeZone: 'America/Sao_Paulo', hour12: false };
  document.getElementById('clock-time').textContent =
    now.toLocaleTimeString('pt-BR', { ...opts, hour: '2-digit', minute: '2-digit' });
  document.getElementById('clock-date').textContent =
    now.toLocaleDateString('pt-BR', { ...opts, weekday: 'short', day: '2-digit', month: 'short' });

  // Atualiza tempo decorrido nos ovos chocando
  document.querySelectorAll('.egg-info-time[data-start]').forEach(el => {
    el.textContent = formatElapsed(el.dataset.start);
  });

  // Atualiza no modal se estiver aberto
  if (currentPos && eggs[currentPos]) {
    document.getElementById('info-tempo').textContent = formatElapsed(eggs[currentPos].inicio);
  }
}

setInterval(updateClock, 60000);
setInterval(() => {
  const now  = new Date();
  const opts = { timeZone: 'America/Sao_Paulo', hour12: false };
  document.getElementById('clock-time').textContent =
    now.toLocaleTimeString('pt-BR', { ...opts, hour: '2-digit', minute: '2-digit' });
}, 1000);

// ============ INICIALIZAÇÃO ============
checkSession();
</script>

</body>
</html>
